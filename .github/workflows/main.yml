name: Monthly update Rotweer

on:
  schedule:
    - cron: "0 5 8 * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: rotweer-update
  cancel-in-progress: false

env:
  R_LIBS_USER: /home/runner/work/_temp/Library

jobs:
  rotweer:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up R
        id: setup-r
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.5.0"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libcurl4-openssl-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            libuv1-dev \
            libfontconfig1-dev \
            libfreetype6-dev

      - name: Create R library directory
        run: mkdir -p "${R_LIBS_USER}"

      - name: Set up R package cache
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-r-${{ steps.setup-r.outputs.installed-r-version }}-${{ hashFiles('.github/workflows/main.yml', 'rotweer.R', 'R/**/*.R') }}
          restore-keys: |
            ${{ runner.os }}-r-${{ steps.setup-r.outputs.installed-r-version }}-
            ${{ runner.os }}-r-

      - name: Install R packages
        run: |
          Rscript -e 'install.packages(c(
            "tidyverse",
            "lubridate",
            "janitor",
            "slider",
            "showtext",
            "patchwork"
          ), repos = "https://cloud.r-project.org")'

      - name: Run script
        env:
          TZ: Europe/Amsterdam
        run: Rscript rotweer.R

      - name: Commit and push changed files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/ plots/

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Monthly Rotweer update $(date -u +'%Y-%m-%d')"
          git push
